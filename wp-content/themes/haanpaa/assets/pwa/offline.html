<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0032A0">
  <title>Haanpaa Martial Arts — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0032A0;
      margin-bottom: 2.5rem;
    }

    .logo span {
      color: #ffffff;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #0032A0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      fill: #ffffff;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #ffffff;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #cccccc;
      max-width: 320px;
    }

    .retry {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.75rem;
      background-color: #0032A0;
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    .retry:hover {
      background-color: #0040cc;
    }
  </style>
</head>
<body>
  <div class="logo">HMA <span>| Haanpaa Martial Arts</span></div>

  <div class="icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4zm7-2.18l8 4V20.18l-8-4V3.82z"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>Your schedule will be available once you're reconnected.</p>

  <button class="retry" onclick="window.location.reload()">Try again</button>
</body>
</html>
