<style>
.hp-sticky-cta{
	position:fixed;
	left:0;right:0;bottom:0;
	z-index:40;
	display:none;
	gap:1px;
	padding:0;
	background:rgba(0,0,0,0.92);
	backdrop-filter:blur(10px);
	-webkit-backdrop-filter:blur(10px);
	border-top:1px solid rgba(255,255,255,0.08);
	transform:translateY(100%);
	transition:transform .25s ease;
}
.hp-sticky-cta[data-visible="true"]{transform:translateY(0)}
.hp-sticky-cta a{
	flex:1;
	display:flex;
	align-items:center;
	justify-content:center;
	gap:.5rem;
	min-height:56px;
	font-family:'Barlow Condensed','Arial Narrow',sans-serif;
	font-weight:700;
	letter-spacing:.06em;
	text-transform:uppercase;
	font-size:.875rem;
	text-decoration:none;
}
.hp-sticky-cta__call{
	background:#1a1a1a;
	color:#ffffff;
	flex:0 0 40%;
}
.hp-sticky-cta__book{
	background:#0032A0;
	color:#ffffff;
}
.hp-sticky-cta__call:hover,.hp-sticky-cta__call:focus-visible{background:#2A2A2A}
.hp-sticky-cta__book:hover,.hp-sticky-cta__book:focus-visible{background:#0041CC}
.hp-sticky-cta a:focus-visible{outline:2px solid #ffffff;outline-offset:-4px}
@media (max-width: 768px){.hp-sticky-cta{display:flex}}
@media (prefers-reduced-motion: reduce){.hp-sticky-cta{transition:none}}
</style>

<script>
(function(){
	var el = document.querySelector('[data-hp-sticky-cta]');
	if(!el) return;
	var threshold = 480;
	var ticking = false;
	function update(){
		var y = window.pageYOffset || document.documentElement.scrollTop;
		el.setAttribute('data-visible', y > threshold ? 'true' : 'false');
		ticking = false;
	}
	function onScroll(){
		if(!ticking){ window.requestAnimationFrame(update); ticking = true; }
	}
	window.addEventListener('scroll', onScroll, { passive: true });
	update();
})();
</script>
